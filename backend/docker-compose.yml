services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"

  auth:
    build:
      context: .
      dockerfile: src/Services/Auth/PizzaApp.Auth.API/Dockerfile
    environment:
      - MongoDB__ConnectionString=mongodb://mongo:27017
      - MongoDB__DatabaseName=PizzaApp_Auth
      - JwtSettings__SecretKey=${JWT_SECRET_KEY}
    depends_on:
      - mongo

  category:
    build:
      context: .
      dockerfile: src/Services/Category/PizzaApp.Category.API/Dockerfile
    environment:
      - MongoDB__ConnectionString=mongodb://mongo:27017
      - MongoDB__DatabaseName=PizzaApp_Category
      - JwtSettings__SecretKey=${JWT_SECRET_KEY}
    depends_on:
      - mongo

  product:
    build:
      context: .
      dockerfile: src/Services/Product/PizzaApp.Product.API/Dockerfile
    environment:
      - MongoDB__ConnectionString=mongodb://mongo:27017
      - MongoDB__DatabaseName=PizzaApp_Product
      - JwtSettings__SecretKey=${JWT_SECRET_KEY}
      - Services__CategoryUrl=http://category:8080/
    depends_on:
      - mongo
      - category

  cart:
    build:
      context: .
      dockerfile: src/Services/Cart/PizzaApp.Cart.API/Dockerfile
    environment:
      - MongoDB__ConnectionString=mongodb://mongo:27017
      - MongoDB__DatabaseName=PizzaApp_Cart
      - JwtSettings__SecretKey=${JWT_SECRET_KEY}
      - Services__ProductUrl=http://product:8080/
    depends_on:
      - mongo
      - product

  gateway:
    build:
      context: .
      dockerfile: src/ApiGateway/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - JwtSettings__SecretKey=${JWT_SECRET_KEY}
      - ReverseProxy__Clusters__auth-cluster__Destinations__auth-1__Address=http://auth:8080/
      - ReverseProxy__Clusters__category-cluster__Destinations__category-1__Address=http://category:8080/
      - ReverseProxy__Clusters__product-cluster__Destinations__product-1__Address=http://product:8080/
      - ReverseProxy__Clusters__cart-cluster__Destinations__cart-1__Address=http://cart:8080/
    depends_on:
      - auth
      - category
      - product
      - cart

volumes:
  mongo-data:
